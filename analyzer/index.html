<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ResuMentor AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>ResuMentor AI</header>

    <div id="hero" class="section">
        <h1>Select Your Path</h1>
        <button class="btn" onclick="showForm('candidate')">Candidate View</button>
        <button class="btn" onclick="showForm('employer')">Employer View</button>
    </div>

    <div id="upload-section" class="section" style="display:none;">
        <button class="btn-back" onclick="goBack()">← Back</button>
        <div id="jd-container" style="display:none;">
            <textarea id="jd-input" placeholder="Paste the Job Description here..."></textarea>
        </div>
        <input type="file" id="resume-file" accept=".pdf">
        <br><br>
        <button class="btn" onclick="processAnalysis()">Analyze Now</button>
    </div>

    <div id="results" class="section result-box">
        <div class="score-side">
            <canvas id="scoreChart"></canvas>
            <h2 id="score-val" style="margin-top:15px;">0%</h2>
        </div>
        <div class="report-side">
            <div id="section-status"></div>
            <div id="skill-tags"></div>
            <div id="improvement-advice"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
